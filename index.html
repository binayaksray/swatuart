<!DOCTYPE html>
<html>
<head>
  <title>Art Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- SEO -->
  <meta name="description" content="Handmade art and craft products. Unique, custom designs. Order directly on WhatsApp." />
  <meta name="keywords" content="handmade art, craft, wall decor, handmade gifts india" />

  <style>
    body { 
      font-family: Arial; 
      margin: 0; 
      padding: 10px; 
      background: #fafafa;
    }

    .logo {
      display: block;
      margin: 0 auto 10px;
      max-width: 120px;
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    .grid { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 12px; 
    }

    .card { 
      border-radius: 10px; 
      padding: 8px; 
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    img { 
      width: 100%; 
      height: 140px;
      object-fit: cover;
      border-radius: 8px; 
    }

    .desc { font-size: 13px; color: #555; }

    .price { font-weight: bold; font-size: 15px; }

    .old-price {
      text-decoration: line-through;
      color: #999;
      font-size: 13px;
      margin-left: 5px;
    }

    .offer { color: red; font-size: 12px; font-weight: bold; }

    .stock { color: green; font-size: 12px; }

    .viewing { font-size: 12px; color: #888; }

    button { 
      background: black; 
      color: white; 
      padding: 8px; 
      border: none; 
      border-radius: 6px; 
      width: 100%;
      margin-top: 5px;
      cursor: pointer;
      font-size: 13px;
    }

    .trust {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }

    .review-box {
      background: #f9f9f9;
      padding: 6px;
      border-radius: 6px;
      margin-top: 6px;
    }

    .review-img {
      width: 100%;
      height: 80px;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 5px;
    }

    .section {
      margin-top: 30px;
    }

    .box {
      background: white;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .loading, .error {
      text-align: center;
      margin-top: 20px;
      color: #666;
    }
  </style>
</head>

<body>

<img src="https://res.cloudinary.com/ddwzhpjom/image/upload/v1778927737/IMG-20260427-WA0009_qv526f.jpg" class="logo" />

<h2>Handmade Art Store</h2>

<div id="products" class="grid"></div>
<div id="status" class="loading">Loading products...</div>

<!-- About -->
<div class="section" style="text-align:center;">
  <p><b>Handmade with ❤️</b></p>
  <p>Created by [Her Name]</p>
  <p>100+ happy customers</p>
</div>

<!-- FAQ -->
<div class="section">
  <h3 style="text-align:center;">FAQs</h3>

  <div class="box">
    <b>How to order?</b>
    <p>Click on "Order on WhatsApp" and send message.</p>
  </div>

  <div class="box">
    <b>Do you take custom orders?</b>
    <p>Yes, message on WhatsApp.</p>
  </div>

  <div class="box">
    <b>Do you teach this?</b>
    <p>No, currently we only sell finished products.</p>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz41PyY-9CZRFv7rQ9NJsPd78dO0WCi7h6QXlbPSkmFwTXm9kp5jZpx3TWgiZDQ13pp/exec";

const container = document.getElementById("products");
const status = document.getElementById("status");

fetch(API_URL)
  .then(res => res.json())
  .then(data => {
    status.style.display = "none";

    data.forEach(p => {
      const card = document.createElement("div");
      card.className = "card";

      const originalPrice = p.price * 2;
      const stock = Math.floor(Math.random() * 5) + 1;
      const viewers = Math.floor(Math.random() * 20) + 5;

      const msg = encodeURIComponent(
        `Hi, I want to order:\n${p.name}\nPrice: ₹${p.price}`
      );

      let reviewHTML = "";

      if (p.review && p.reviewer) {
        reviewHTML = `
          <div class="review-box">
            ${p.review_image ? `<img src="${p.review_image}" class="review-img" />` : ""}
            ⭐⭐⭐⭐⭐
            <p style="font-size:12px;">"${p.review}"</p>
            <small>- ${p.reviewer}</small>
          </div>
        `;
      }

      card.innerHTML = `
        <img src="${p.image}" alt="Handmade ${p.name}" />
        <h4>${p.name}</h4>
        <p class="desc">${p.description || ''}</p>

        <p class="price">
          ₹${p.price}
          <span class="old-price">₹${originalPrice}</span>
        </p>

        <p class="offer">Limited Time Offer</p>
        <p class="stock">Only ${stock} left</p>
        <p class="viewing">🔥 ${viewers} people viewed today</p>

        ${reviewHTML}

        <button onclick="window.open('https://wa.me/${p.whatsapp}?text=${msg}')">
          Order on WhatsApp
        </button>

        <div class="trust">
          ✔ Handmade<br>
          ✔ Quality checked<br>
          ✔ Direct WhatsApp support
        </div>
      `;

      container.appendChild(card);
    });
  })
  .catch(err => {
    status.innerText = "Failed to load products.";
    status.className = "error";
  });
</script>

</body>
</html>
