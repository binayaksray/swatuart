<!DOCTYPE html>
<html lang="en">
<head>
  <title>Handmade Art Store | Unique Crafts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Handmade art and craft products. Unique, custom designs. Order directly on WhatsApp." />
  <meta name="keywords" content="handmade art, craft, wall decor, handmade gifts india" />

  <link href="https://fonts.googleapis.com/css2?family=Lora&family=Nunito&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #F9F7F3;
      --card-bg: #FFFFFF;
      --primary-text: #3E3B38;
      --secondary-text: #6B6661;
      --accent-color: #6C826B;
      --price-color: #B56B45;
    }

    body {
      font-family: 'Nunito', sans-serif;
      padding: 20px 15px;
      background: var(--bg-color);
      color: var(--primary-text);
      max-width: 800px;
      margin: 0 auto;
    }

    .header-section { text-align: center; }
    .logo { width: 100px; border-radius: 50%; margin-bottom: 10px; }
    h2 { font-family: 'Lora', serif; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }

    .card {
      background: white;
      padding: 12px;
      border-radius: 12px;
      position: relative;
    }

    img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
    }

    .price { font-weight: bold; color: var(--price-color); }
    .old-price { text-decoration: line-through; color: #aaa; }

    button {
      background: var(--accent-color);
      color: white;
      padding: 10px;
      border: none;
      width: 100%;
      border-radius: 6px;
      cursor: pointer;
    }

    .trust { font-size: 11px; color: #777; }

    .section { margin-top: 30px; }

    .box {
      background: white;
      padding: 10px;
      border-radius: 10px;
      min-width: 220px;
    }

    #reviews {
      display: flex;
      gap: 10px;
      overflow-x: auto;
    }

    .review-img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="header-section">
  <img src="https://res.cloudinary.com/ddwzhpjom/image/upload/v1778927737/IMG-20260427-WA0009_qv526f.jpg" class="logo">
  <h2>Handmade Art Store</h2>
  <p>Crafted with passion, delivered with love.</p>
</div>

<div id="products" class="grid"></div>

<div class="section">
  <h3>Happy Customers</h3>
  <div id="reviews"></div>
</div>

<div class="section">
  <h3>FAQ</h3>
  <div class="box"><b>How to order?</b><p>Click WhatsApp button.</p></div>
  <div class="box"><b>Custom orders?</b><p>Yes via WhatsApp.</p></div>
  <div class="box"><b>Do you teach?</b><p>No, only selling products.</p></div>
</div>

<div class="section" style="text-align:center;">
  <p><b>Handmade with ❤️</b></p>
  <p>Created by [Her Name]</p>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz41PyY-9CZRFv7rQ9NJsPd78dO0WCi7h6QXlbPSkmFwTXm9kp5jZpx3TWgiZDQ13pp/exec";

fetch(API_URL)
.then(res => res.json())
.then(data => {
  const container = document.getElementById("products");
  const reviewContainer = document.getElementById("reviews");

  data.forEach(p => {

    const today = new Date().toISOString().slice(0,10);
    const key = `store_${p.id}_${today}`;

    let stored = localStorage.getItem(key);

    if (!stored) {
      stored = {
        stock: Math.floor(Math.random()*5)+1,
        viewers: Math.floor(Math.random()*20)+5
      };
      localStorage.setItem(key, JSON.stringify(stored));
    } else {
      stored = JSON.parse(stored);
    }

    const msg = encodeURIComponent(
      `Hi, I'm interested in:\n${p.name}\n₹${p.price}`
    );

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${p.image}" onclick="window.open('${p.image}')">
      <h4>${p.name}</h4>
      <p>${p.description || ""}</p>

      <p class="price">₹${p.price} <span class="old-price">₹${p.price*2}</span></p>
      <p>Only ${stored.stock} left</p>
      <p>🔥 ${stored.viewers} viewed today</p>

      <button onclick="window.open('https://wa.me/${p.whatsapp}?text=${msg}')">
        Order
      </button>

      <div class="trust">
        ✔ Handmade by artist<br>
        ✔ Quality checked<br>
        ✔ WhatsApp support
      </div>
    `;

    container.appendChild(card);

    if (p.review) {
      const r = document.createElement("div");
      r.className = "box";

      r.innerHTML = `
        ${p.review_image ? `<img src="${p.review_image}" class="review-img">` : ""}
        ⭐⭐⭐⭐⭐
        <p>"${p.review}"</p>
        <small>- ${p.reviewer}</small>
      `;

      reviewContainer.appendChild(r);
    }

  });
});
</script>

</body>
</html>
