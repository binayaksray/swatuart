<!DOCTYPE html>
<html>
<head>
  <title>Art Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { 
      font-family: Arial; 
      margin: 0; 
      padding: 10px; 
      background: #fafafa;
    }

    .logo {
      display: block;
      margin: 0 auto 10px;
      max-width: 120px;
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    .grid { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 12px; 
    }

    .card { 
      border-radius: 10px; 
      padding: 8px; 
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    img { 
      width: 100%; 
      height: 140px;
      object-fit: cover;
      border-radius: 8px; 
    }

    .desc {
      font-size: 13px;
      color: #555;
    }

    .price {
      font-weight: bold;
      font-size: 15px;
    }

    .old-price {
      text-decoration: line-through;
      color: #999;
      font-size: 13px;
      margin-left: 5px;
    }

    .offer {
      color: red;
      font-size: 12px;
      font-weight: bold;
    }

    .stock {
      color: green;
      font-size: 12px;
    }

    button { 
      background: black; 
      color: white; 
      padding: 8px; 
      border: none; 
      border-radius: 6px; 
      width: 100%;
      margin-top: 5px;
      cursor: pointer;
      font-size: 13px;
    }

    .faq {
      margin-top: 30px;
    }

    .faq h3 {
      text-align: center;
    }

    .faq-item {
      background: white;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .loading, .error {
      text-align: center;
      margin-top: 20px;
      color: #666;
    }
  </style>
</head>

<body>

<img src="https://res.cloudinary.com/ddwzhpjom/image/upload/v1778927737/IMG-20260427-WA0009_qv526f.jpg" class="logo" />

<h2>Art Store</h2>

<div id="products" class="grid"></div>
<div id="status" class="loading">Loading products...</div>

<!-- FAQ Section -->
<div class="faq">
  <h3>FAQs</h3>

  <div class="faq-item">
    <b>How to order?</b>
    <p>Click on "Order on WhatsApp" and send message.</p>
  </div>

  <div class="faq-item">
    <b>Do you take custom orders?</b>
    <p>Yes, you can message on WhatsApp.</p>
  </div>

  <!-- You can add more later -->
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz41PyY-9CZRFv7rQ9NJsPd78dO0WCi7h6QXlbPSkmFwTXm9kp5jZpx3TWgiZDQ13pp/exec";

const container = document.getElementById("products");
const status = document.getElementById("status");

fetch(API_URL)
  .then(res => res.json())
  .then(data => {
    status.style.display = "none";

    data.forEach(p => {
      const card = document.createElement("div");
      card.className = "card";

      const originalPrice = p.price * 2;

      const msg = encodeURIComponent(
        `Hi, I want to order:\n${p.name}\nPrice: ₹${p.price}`
      );

      card.innerHTML = `
        <img src="${p.image}" />
        <h4>${p.name}</h4>
        <p class="desc">${p.description || ''}</p>

        <p class="price">
          ₹${p.price}
          <span class="old-price">₹${originalPrice}</span>
        </p>

        <p class="offer">Limited Time Offer</p>
        <p class="stock">Only few pieces left</p>

        <button onclick="window.open('https://wa.me/${p.whatsapp}?text=${msg}')">
          Order on WhatsApp
        </button>
      `;

      container.appendChild(card);
    });
  })
  .catch(err => {
    status.innerText = "Failed to load products.";
    status.className = "error";
  });
</script>

</body>
</html>
