<!DOCTYPE html>
<html lang="en">
<head>
  <title>Handmade Art Store | Unique Crafts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Handmade art and craft products. Unique, custom designs. Order directly on WhatsApp." />
  <meta name="keywords" content="handmade art, craft, wall decor, handmade gifts india" />

  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #F9F7F3;
      --card-bg: #FFFFFF;
      --primary-text: #3E3B38;
      --secondary-text: #6B6661;
      --accent-color: #6C826B;
      --accent-hover: #5A6D59;
      --price-color: #B56B45;
      --border-radius: 16px;
    }

    body { 
      font-family: 'Nunito', sans-serif; 
      padding: 20px 15px; 
      background: var(--bg-color);
      color: var(--primary-text);
      max-width: 800px;
      margin: 0 auto;
    }

    .header-section { text-align: center; margin-bottom: 20px; }
    .logo { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 10px; }
    h2 { font-family: 'Lora', serif; font-size: 28px; margin: 0; }
    .subtitle { color: var(--secondary-text); font-size: 14px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }

    .card { 
      border-radius: var(--border-radius); 
      padding: 12px; 
      background: var(--card-bg);
      box-shadow: 0 4px 15px rgba(0,0,0,0.04);
      position: relative;
    }

    img { width: 100%; height: 160px; object-fit: cover; border-radius: 12px; margin-bottom: 10px; }

    h4 { font-family: 'Lora', serif; margin: 0 0 5px; font-size: 16px; }
    .desc { font-size: 13px; color: var(--secondary-text); margin-bottom: 10px; }

    .price { font-weight: 700; font-size: 18px; color: var(--price-color); }
    .old-price { text-decoration: line-through; color: #aaa; font-size: 13px; margin-left: 6px; }

    .offer { color: var(--price-color); font-size: 11px; font-weight: 700; }
    .stock { color: var(--accent-color); font-size: 12px; }
    .viewing { font-size: 12px; color: #888; margin-bottom: 10px; }

    button { 
      background: var(--accent-color); color: white; padding: 10px; border: none; border-radius: 8px; width: 100%; cursor: pointer;
    }

    .trust { font-size: 11px; color: #999; margin-top: 8px; }

    .section { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }

    .box { background: white; padding: 12px; border-radius: 12px; }

    .review-img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 6px; }

    /* REVIEW CAROUSEL */
    #reviews {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 10px;
    }

    #reviews .box {
      min-width: 220px;
    }

    .loading, .error { text-align: center; margin-top: 20px; }
  </style>
</head>

<body>

<div class="header-section">
  <img src="https://res.cloudinary.com/ddwzhpjom/image/upload/v1778927737/IMG-20260427-WA0009_qv526f.jpg" class="logo" />
  <h2>Handmade Art Store</h2>
  <p class="subtitle">Crafted with passion, delivered with love.</p>
  <p style="font-size:13px; color:#888;">🚚 Pan India delivery | 💬 Fast WhatsApp support</p>
</div>

<div id="products" class="grid"></div>
<div id="status" class="loading">Loading...</div>

<div class="section">
  <h3 style="text-align:center;">Happy Customers</h3>
  <div id="reviews"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz41PyY-9CZRFv7rQ9NJsPd78dO0WCi7h6QXlbPSkmFwTXm9kp5jZpx3TWgiZDQ13pp/exec";

const container = document.getElementById("products");
const reviewContainer = document.getElementById("reviews");
const status = document.getElementById("status");

fetch(API_URL)
  .then(res => res.json())
  .then(data => {

    if (!data.length) {
      status.innerText = "No products available right now.";
      return;
    }

    status.style.display = "none";

    data.forEach(p => {
      const card = document.createElement("div");
      card.className = "card";

      const originalPrice = p.price * 2;
      const stock = Math.floor(Math.random() * 5) + 1;
      const viewers = Math.floor(Math.random() * 20) + 5;
      const isBestSeller = Math.random() > 0.7;

      const msg = encodeURIComponent(
        `Hi, I'm interested in this product:\n\n${p.name}\nPrice: ₹${p.price}\n\nPlease share details.`
      );

      card.innerHTML = `
        ${isBestSeller ? `<div style="position:absolute; background:#B56B45; color:white; font-size:10px; padding:4px 6px; border-radius:6px;">Best Seller</div>` : ""}

        <img src="${p.image}" onclick="window.open('${p.image}', '_blank')" style="cursor:pointer;" />

        <h4>${p.name}</h4>
        <p class="desc">${p.description || ''}</p>

        <p class="price">
          ₹${p.price}
          <span class="old-price">₹${originalPrice}</span>
        </p>

        <p class="offer">Limited Time Offer</p>
        <p class="stock">Only ${stock} left</p>
        <p class="viewing">🔥 ${viewers} people viewing</p>

        <button onclick="window.open('https://wa.me/${p.whatsapp}?text=${msg}')">
          Order on WhatsApp
        </button>

        <div class="trust">
          ✔ Handmade by artist<br>
          ✔ Quality checked<br>
          ✔ Direct WhatsApp support
        </div>
      `;

      container.appendChild(card);

      if (p.review && p.reviewer) {
        const reviewCard = document.createElement("div");
        reviewCard.className = "box";

        reviewCard.innerHTML = `
          ${p.review_image ? `<img src="${p.review_image}" class="review-img" />` : ""}
          ⭐⭐⭐⭐⭐
          <p>"${p.review}"</p>
          <small>- ${p.reviewer}</small>
        `;

        reviewContainer.appendChild(reviewCard);
      }
    });
  })
  .catch(() => {
    status.innerText = "Failed to load products.";
  });
</script>

</body>
</html>
